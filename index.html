<!DOCTYPE html>
<html lang="en">

tailwind.config = {

      },
      animation: {
        'shimmer': 'shimmer 2s linear infinite',
      },
      keyframes: {
        shimmer: {
          '0%': { backgroundPosition: '-1000px 0' },
          '100%': { backgroundPosition: '1000px 0' }
        }
      }
    }
  }
}

</head>
<body class="flex h-screen overflow-hidden font-sans selection:bg-brand-500 selection:text-white">

<script>
class RareGradeApp {
  constructor() {
    this.clients = [];
    this.reports = [];
    this.currentView = 'dashboard';
    this.chartInstance = null;
    this.db = null;
    this.currentReportType = 'Hardware';
    this.sidebarOpen = true;
    this.timeInterval = null;
    this.pendingDeleteKey = null;
    this.currentReportKey = null;
    this.statuses = ['Received', 'In Repair', 'Waiting for Parts', 'Ready for Pickup', 'Completed'];
    this.init();
  }

  init() {
    this.initFirebase();
    this.setupRealtimeListeners();
    this.updateDate();
    this.renderClientDropdown();
    this.initChart();
    this.generateReportID();
    this.navigate('dashboard');

    document.getElementById('newClientName')?.addEventListener('input', (e) => {
      const name = e.target.value.trim();
      const id = name ? 'RGT-' + name.substring(0,3).toUpperCase() + Math.floor(1000 + Math.random() * 9000) : '---';
      document.getElementById('preview-client-id').innerText = id;
    });
  }

  initFirebase() {
    const firebaseConfig = {
      apiKey: "AIzaSyAEoYlvqPCNwFAqqJ7fLVFd6ZskCkMy5Y4",
      authDomain: "joyjam-ad90e.firebaseapp.com",
      projectId: "joyjam-ad90e",
      storageBucket: "joyjam-ad90e.firebasestorage.app",
      messagingSenderId: "71554980471",
      appId: "1:71554980471:web:d62a9f560232575faa8472",
      measurementId: "G-SQC5KK3Y37"
    };
    firebase.initializeApp(firebaseConfig);
    this.db = firebase.database();
  }

  setupRealtimeListeners() {
    this.db.ref('clients').on('value', (snapshot) => {
      this.clients = [];
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          const client = child.val();
          client._key = child.key;
          this.clients.push(client);
        });
      }
      this.updateStats();
      if (this.currentView === 'manage-clients' || this.currentView === 'dashboard') {
        this.renderTables();
      }
      this.renderClientDropdown();
    });

    this.db.ref('reports').on('value', (snapshot) => {
      this.reports = [];
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          const report = child.val();
          report._key = child.key;
          this.reports.push(report);
        });
      }
      this.updateStats();
    });
  }

  navigate(viewId) {
    document.querySelectorAll('.view-section').forEach(el => {
      el.classList.add('hidden');
      el.classList.remove('animate-fade-in');
    });

    const target = document.getElementById(`view-${viewId}`);
    if(target) {
      target.classList.remove('hidden');
      void target.offsetWidth;
      target.classList.add('animate-fade-in');
    }

    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeBtn = document.getElementById(`nav-${viewId}`);
    if(activeBtn) activeBtn.classList.add('active');

    const titles = {
      'dashboard': 'System Dashboard',
      'add-client': 'Client Onboarding',
      'manage-clients': 'Client Registry',
      'service-form': 'Service Report Generator'
    };
    document.getElementById('page-title').innerText = titles[viewId] || 'Dashboard';

    this.currentView = viewId;
    if(viewId === 'manage-clients') this.renderTables();
    if(viewId === 'service-form') {
      this.renderClientDropdown();
      this.setReportType(this.currentReportType);
    }
  }

  handleAddClient(e) {
    e.preventDefault();
    const name = document.getElementById('newClientName').value.trim();
    const phone = document.getElementById('newClientPhone').value.trim();
    const email = document.getElementById('newClientEmail').value.trim();

    if(!name || !phone) return;

    const displayId = 'RGT-' + name.substring(0,3).toUpperCase() + Math.floor(1000 + Math.random() * 9000);

    const newClient = {
      displayId: displayId,
      name: name,
      phone: phone,
      email: email || '',
      date: new Date().toLocaleDateString(),
      timestamp: Date.now()
    };

    this.db.ref('clients').push(newClient).then(() => {
      e.target.reset();
      document.getElementById('preview-client-id').innerText = '---';
      this.showToast('Client Registered', `${name} saved to Realtime Database`);
      setTimeout(() => this.navigate('manage-clients'), 800);
    });
  }

  renderTables() {
    const tbody = document.getElementById('client-table-body');
    const recentList = document.getElementById('recent-clients-list');

    tbody.innerHTML = '';
    recentList.innerHTML = '';

    if(this.clients.length === 0) {
      document.getElementById('empty-state').classList.remove('hidden');
    } else {
      document.getElementById('empty-state').classList.add('hidden');
    }

    const sortedClients = [...this.clients].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    sortedClients.forEach(client => {
      const clientReports = this.reports.filter(r => r.clientKey === client._key);
      const reportCount = clientReports.length;

      const tr = document.createElement('tr');
      tr.className = 'hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0 table-row-shimmer';
      tr.dataset.key = client._key;
      tr.innerHTML = `
        <td class="px-4 py-3 text-left align-middle">
          <div class="font-medium text-slate-900">${client.name}</div>
        </td>
        <td class="px-4 py-3 text-left align-middle">
          <div class="font-mono text-brand-600 font-medium text-sm">${client.displayId || client.id || 'N/A'}</div>
        </td>
        <td class="px-4 py-3 text-left align-middle">
          <div class="text-xs text-slate-600">${client.phone}</div>
          <div class="text-[10px] text-slate-500">${client.email}</div>
        </td>
        <td class="px-4 py-3 text-left align-middle">
          <div class="text-slate-500 text-xs">${client.date}</div>
        </td>
        <td class="px-4 py-3 text-right align-middle">
          <div class="flex items-center justify-end gap-2">
            <button onclick="app.prepReport('${client._key}')" class="text-xs bg-brand-100 text-brand-600 hover:bg-brand-500 hover:text-white px-3 py-1.5 rounded-lg transition-colors font-medium whitespace-nowrap">
              Create Report
            </button>
            ${reportCount > 0 ? `<button onclick="app.viewReports('${client._key}')" class="text-xs bg-emerald-100 text-emerald-600 hover:bg-emerald-500 hover:text-white px-3 py-1.5 rounded-lg transition-colors font-medium whitespace-nowrap">
              View Reports (${reportCount})
            </button>` : ''}
            <button onclick="app.confirmDelete('${client._key}')" class="text-xs bg-red-100 text-red-600 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded-lg transition-colors font-medium whitespace-nowrap">
              Delete
            </button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    sortedClients.slice(0, 5).forEach(client => {
      const tr = document.createElement('tr');
      tr.className = 'table-row-shimmer';
      tr.dataset.key = client._key;
      tr.innerHTML = `
        <td class="px-6 py-4 font-medium text-slate-700">${client.name}</td>
        <td class="px-6 py-4 font-mono text-xs text-brand-600">${client.displayId || client.id || 'N/A'}</td>
        <td class="px-6 py-4 text-xs">${client.date}</td>
        <td class="px-6 py-4"><span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-1 rounded uppercase font-bold border border-emerald-200">Active</span></td>
      `;
      recentList.appendChild(tr);
    });
  }

  // ────────────────────────────────────────────────────────────────
  // Everything below this line was completed / restored
  // ────────────────────────────────────────────────────────────────

  generateReportID() {
    const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
    const rand = Math.floor(1000 + Math.random() * 9000);
    const id = `REP-${date}-${rand}`;
    const now = new Date();
    const today = now.toLocaleDateString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric' });
    const dateEl = document.getElementById('display-date');
    const dateFullEl = document.getElementById('display-date-full');

    if (dateEl) dateEl.value = today;
    if (dateFullEl) dateFullEl.value = today;
  }

  setReportType(type) {
    this.currentReportType = type;
    document.getElementById('report-type-title').innerText = type.toUpperCase();

    document.getElementById('report-type-hardware').classList.toggle('bg-brand-600', type === 'Hardware');
    document.getElementById('report-type-hardware').classList.toggle('text-white', type === 'Hardware');
    document.getElementById('report-type-hardware').classList.toggle('bg-slate-100', type !== 'Hardware');
    document.getElementById('report-type-hardware').classList.toggle('text-slate-600', type !== 'Hardware');

    document.getElementById('report-type-software').classList.toggle('bg-brand-600', type === 'Software');
    document.getElementById('report-type-software').classList.toggle('text-white', type === 'Software');
    document.getElementById('report-type-software').classList.toggle('bg-slate-100', type !== 'Software');
    document.getElementById('report-type-software').classList.toggle('text-slate-600', type !== 'Software');

    const checkboxes = document.querySelectorAll('.service-checkbox');
    checkboxes.forEach(cb => {
      cb.disabled = (type === 'Software');
    });
  }

  prepReport(clientKey) {
    this.navigate('service-form');
    this.clearReportForm();
    this.currentReportKey = null;
    document.getElementById('report-client-select').value = clientKey;
    this.loadClientToForm(clientKey);
  }

  loadClientToForm(clientKey) {
    const client = this.clients.find(c => c._key === clientKey);
    if(client) {
      document.getElementById('display-client-name').value = client.name || '';
      document.getElementById('display-client-phone').value = client.phone || '';
      document.getElementById('display-client-email').value = client.email || '';
    }
  }

  renderClientDropdown() {
    const select = document.getElementById('report-client-select');
    select.innerHTML = '<option value="">-- Select Client --</option>';
    this.clients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c._key;
      opt.text = `${c.name} (${c.displayId || c.id || 'N/A'})`;
      select.appendChild(opt);
    });
  }

  confirmDelete(key) {
    this.pendingDeleteKey = key;
    const modal = document.getElementById('confirm-modal');
    const content = document.getElementById('confirm-modal-content');

    modal.classList.remove('hidden');
    modal.classList.add('flex');

    setTimeout(() => {
      content.classList.remove('scale-95', 'opacity-0');
      content.classList.add('scale-100', 'opacity-100');
    }, 10);

    const actionBtn = document.getElementById('confirm-modal-action');
    actionBtn.onclick = () => this.executeDelete();
  }

  closeConfirmModal() {
    const modal = document.getElementById('confirm-modal');
    const content = document.getElementById('confirm-modal-content');

    content.classList.remove('scale-100', 'opacity-100');
    content.classList.add('scale-95', 'opacity-0');

    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      this.pendingDeleteKey = null;
    }, 300);
  }

  executeDelete() {
    if (!this.pendingDeleteKey) return;

    this.db.ref('clients/' + this.pendingDeleteKey).remove().then(() => {
      this.closeConfirmModal();
      this.showToast('Client Deleted', 'Client removed from Realtime Database');
    }).catch(err => {
      this.closeConfirmModal();
      this.showToast('Error', 'Failed to delete client: ' + err.message, 'error');
    });
  }

  parseDate(dateStr) {
    const formats = [
      /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/,
      /^(\d{1,2})-(\d{1,2})-(\d{4})$/,
      /^(\d{4})-(\d{1,2})-(\d{1,2})$/,
      /^(\d{1,2})-(\d{1,2})-(\d{4})$/
    ];

    for (let format of formats) {
      const match = dateStr.match(format);
      if (match) {
        let year, month, day;

        if (dateStr.includes('/')) {
          month = parseInt(match[1]) - 1;
          day = parseInt(match[2]);
          year = parseInt(match[3]);
        } else if (dateStr.startsWith(match[1]) && match[1].length === 4) {
          year = parseInt(match[1]);
          month = parseInt(match[2]) - 1;
          day = parseInt(match[3]);
        } else {
          day = parseInt(match[1]);
          month = parseInt(match[2]) - 1;
          year = parseInt(match[3]);
        }

        const date = new Date(year, month, day);
        if (date.getFullYear() === year && date.getMonth() === month && date.getDate() === day) {
          return date;
        }
      }
    }

    const d = new Date(dateStr);
    if (!isNaN(d.getTime())) return d;
    return null;
  }

  globalSearch(value) {
    const term = value.toLowerCase().trim();
    if (term.length >= 2) {
      this.navigate('manage-clients');
      document.getElementById('client-search').value = term;
      this.filterClients();
    }
  }

  filterDashboard() {
    const term = document.getElementById('dashboard-search').value.toLowerCase().trim();
    const rows = document.querySelectorAll('#recent-clients-list tr');

    if (!term) {
      rows.forEach(row => row.style.display = '');
      return;
    }

    rows.forEach(row => {
      const text = row.innerText.toLowerCase();
      let matches = text.includes(term);

      if (!matches) {
        const key = row.dataset.key;
        if (key) {
          const reports = this.reports.filter(r => r.clientKey === key);
          for (let r of reports) {
            if (
              (r.deviceInfo?.model || '').toLowerCase().includes(term) ||
              (r.deviceInfo?.serial || '').toLowerCase().includes(term)
            ) {
              matches = true;
              break;
            }
          }
        }
      }

      row.style.display = matches ? '' : 'none';
    });
  }

  filterClients() {
    const term = document.getElementById('client-search').value.toLowerCase().trim();
    const rows = document.querySelectorAll('#client-table-body tr');

    if (!term) {
      rows.forEach(row => row.style.display = '');
      return;
    }

    rows.forEach(row => {
      const text = row.innerText.toLowerCase();
      const dateCell = row.cells[3]?.innerText;

      let matchesText = text.includes(term);
      let matchesDate = false;
      let matches = matchesText;

      if (dateCell) {
        const searchDate = this.parseDate(term);
        if (searchDate) {
          const rowDate = new Date(dateCell);
          matchesDate = rowDate.getFullYear() === searchDate.getFullYear() &&
                        rowDate.getMonth() === searchDate.getMonth() &&
                        rowDate.getDate() === searchDate.getDate();
          if (matchesDate) matches = true;
        }
      }

      if (!matches) {
        const key = row.dataset.key;
        if (key) {
          const reports = this.reports.filter(r => r.clientKey === key);
          for (let r of reports) {
            if (
              (r.deviceInfo?.model || '').toLowerCase().includes(term) ||
              (r.deviceInfo?.serial || '').toLowerCase().includes(term) ||
              (r.deviceInfo?.issue || '').toLowerCase().includes(term)
            ) {
              matches = true;
              break;
            }
          }
        }
      }

      row.style.display = matches ? '' : 'none';
    });
  }

  showToast(title, message, type = 'success') {
    const toast = document.getElementById('toast');
    if (!toast) return;

    const titleEl = document.getElementById('toast-title');
    const msgEl = document.getElementById('toast-msg');
    const icon = document.getElementById('toast-icon');

    titleEl.innerText = title;
    msgEl.innerText = message;

    if (type === 'error') {
      icon.className = 'fa-solid fa-circle-exclamation text-red-500 text-xl';
    } else {
      icon.className = 'fa-solid fa-check-circle text-emerald-500 text-xl';
    }

    toast.classList.remove('translate-y-20', 'opacity-0');
    setTimeout(() => {
      toast.classList.add('translate-y-20', 'opacity-0');
    }, 3000);
  }

  updateDate() {
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const dateEl = document.getElementById('current-date');
    if (dateEl) dateEl.innerText = new Date().toLocaleDateString('en-US', options);
  }

  initChart() {
    const ctx = document.getElementById('activityChart');
    if (!ctx) return;

    const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(14, 165, 233, 0.4)');
    gradient.addColorStop(1, 'rgba(14, 165, 233, 0)');

    this.chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
        datasets: [{
          label: 'System Load',
          data: [12, 19, 15, 25, 22, 30, 28],
          borderColor: '#0ea5e9',
          backgroundColor: gradient,
          borderWidth: 3,
          pointBackgroundColor: '#fff',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { grid: { color: '#e2e8f0' }, ticks: { color: '#64748b' } },
          x: { grid: { display: false }, ticks: { color: '#64748b' } }
        }
      }
    });
  }

  updateStats() {
    // Simple placeholder — you can expand this later
    document.getElementById('stat-clients').innerText = this.clients.length;
    document.getElementById('stat-reports').innerText = this.reports.length;
  }

  clearReportForm() {
    // Reset all form fields — add more IDs if needed
    ['display-client-name', 'display-client-phone', 'display-client-email',
     'display-device-model', 'display-serial', 'display-issue',
     'display-diagnosis', 'display-resolution', 'display-technician-name',
     'display-notes', 'display-client-signature', 'display-date-full',
     'display-other-service', 'display-before-partial', 'display-after-partial',
     'display-issues-persisting'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });

    document.querySelectorAll('.service-checkbox').forEach(cb => cb.checked = false);
    document.getElementById('report-client-select').value = '';
    document.getElementById('device-status').value = 'Received';
  }

  saveReport() {
    // Placeholder — implement full save logic when ready
    this.showToast('Saved', 'Report saved (placeholder)');
  }

  toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
  }
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
  window.app = new RareGradeApp();
});
</script>
